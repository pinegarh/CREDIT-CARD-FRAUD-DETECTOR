<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FraudGuard ML | Transaction Scanner</title>
    <style>
        :root {
            --primary: #00f2fe;
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-gradient);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ccc;
        }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4);
        }

        #result-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        .safe {
            background: rgba(46, 204, 113, 0.2);
            border: 1px solid #2ecc71;
            color: #2ecc71;
        }

        .fraud {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid #e74c3c;
            color: #e74c3c;
        }

        .loading {
            text-align: center;
            display: none;
            color: var(--primary);
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>🛡️ AI Fraud Scanner</h2>
        <form id="fraudForm">
            <div class="form-group">
                <label for="amount">Transaction Amount ($)</label>
                <input type="number" id="amount" placeholder="e.g. 150.00" required step="0.01">
            </div>
            <div class="form-group">
                <label for="time">Time Since Last Transaction (Seconds)</label>
                <input type="number" id="time" placeholder="e.g. 3600" required>
            </div>
            <button type="submit">Analyze Transaction</button>
        </form>
        <div id="loading" class="loading">Processing Machine Learning Model...</div>
        <div id="result-box"></div>
    </div>

    <script>
        document.getElementById('fraudForm').addEventListener('submit', async function (event) {
            event.preventDefault();

            const resultBox = document.getElementById('result-box');
            const loadingText = document.getElementById('loading');
            const amountValue = document.getElementById('amount').value.trim();
            const timeValue = document.getElementById('time').value.trim();

            resultBox.style.display = 'none';
            resultBox.className = '';
            loadingText.style.display = 'block';

            if (!amountValue || !timeValue) {
                loadingText.style.display = 'none';
                resultBox.style.display = 'block';
                resultBox.classList.add('fraud');
                resultBox.innerHTML = '❌ Please enter both Amount and Time values.';
                return;
            }

            const payload = {
                Amount: parseFloat(amountValue),
                Time: parseInt(timeValue, 10)
            };

            if (Number.isNaN(payload.Amount) || Number.isNaN(payload.Time)) {
                loadingText.style.display = 'none';
                resultBox.style.display = 'block';
                resultBox.classList.add('fraud');
                resultBox.innerHTML = '❌ Invalid input: Amount and Time must be numbers.';
                return;
            }

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json().catch(() => null);
                loadingText.style.display = 'none';
                resultBox.style.display = 'block';

                if (!response.ok) {
                    resultBox.innerHTML = `❌ Error: ${data?.error || response.statusText}`;
                    resultBox.classList.add('fraud');
                    return;
                }

                if (data && data.is_fraud) {
                    resultBox.innerHTML = '⚠️ High Risk: Potential Fraud Detected!';
                    resultBox.classList.add('fraud');
                } else {
                    resultBox.innerHTML = '✅ Transaction Verified: Safe';
                    resultBox.classList.add('safe');
                }
            } catch (error) {
                loadingText.style.display = 'none';
                resultBox.style.display = 'block';
                resultBox.innerHTML = '❌ Error: Could not connect to backend.';
                console.error('Error:', error);
            }
        });
    </script>
</body>

</html>
